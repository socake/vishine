name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build both sites (demo + tutorial)
        run: |
          # 主题（仓库根）软链进各站点的 themes/vishine
          mkdir -p exampleSite/themes tutorialSite/themes
          ln -sfn ../.. exampleSite/themes/vishine
          ln -sfn ../.. tutorialSite/themes/vishine
          BASE="${{ steps.pages.outputs.base_url }}"
          # 成品 Demo → 根路径
          hugo --source exampleSite --gc --minify --baseURL "$BASE/"
          # 教程文档站 → /tutorial/ 子路径，输出合并进 demo 的 public/tutorial
          hugo --source tutorialSite --gc --minify --baseURL "$BASE/tutorial/" -d "$PWD/exampleSite/public/tutorial"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
