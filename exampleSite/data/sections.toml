  "AWS"      = "docs"
  "监控"      = "docs"
  "云原生"    = "play"
  "多云"      = "play"
  "CI/CD"    = "play"
  "FinOps"   = "road"
  "Linux"    = "road"
  "故障复盘"  = "ai"
  "大模型"    = "res"
  "AI工具"    = "res"
  "AI 工具"   = "res"
  "RAG"      = "res"
