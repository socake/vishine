# exampleSite 站点的分类 → 板块色映射（演示）
# Hugo 深合并：站点 data/sections.toml 覆盖主题 data/sections.toml。
# 别人用主题时，在自己站点的 data/sections.toml 里写自己的分类映射即可。
[categories]
