<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img"
     aria-label="Nacos 集群架构图：客户端经 gRPC/HTTP 接入三节点集群，nacos-1 为 LEADER、nacos-2/3 为 FOLLOWER，Distro 协议管临时实例走 AP，Raft 协议管持久实例/配置/元数据走 CP，数据持久化到外置 MySQL。">
  <defs>
    <style>
      .panel  { fill:#f8f7f2; }
      .grid   { stroke:#e7e2d6; stroke-width:1; }
      .lbl    { font-family:"Noto Sans SC",system-ui,sans-serif; }
      .mono   { font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace; }
      .ink    { fill:#20201d; }
      .ink2   { fill:#56544d; }
      .ink3   { fill:#8c887d; }
      .box    { fill:#ffffff; stroke:#ddd7c9; stroke-width:1.5; }
      .flow   { stroke:#b8b1a1; stroke-width:1.8; fill:none; }
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#b8b1a1"/>
    </marker>
    <marker id="ahr" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#3a5e8c"/>
    </marker>
    <marker id="ahl" markerWidth="8" markerHeight="8" refX="1.5" refY="4" orient="auto">
      <path d="M8 0 L0 4 L8 8 Z" fill="#3a5e8c"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect class="panel" x="0" y="0" width="800" height="600" rx="14"/>
  <g class="grid" opacity="0.55">
    <path d="M0 40 H800 M0 80 H800 M0 120 H800 M0 160 H800 M0 200 H800 M0 240 H800 M0 280 H800 M0 320 H800 M0 360 H800 M0 400 H800 M0 440 H800 M0 480 H800 M0 520 H800 M0 560 H800"/>
    <path d="M40 0 V600 M80 0 V600 M120 0 V600 M160 0 V600 M200 0 V600 M240 0 V600 M280 0 V600 M320 0 V600 M360 0 V600 M400 0 V600 M440 0 V600 M480 0 V600 M520 0 V600 M560 0 V600 M600 0 V600 M640 0 V600 M680 0 V600 M720 0 V600 M760 0 V600"/>
  </g>

  <!-- title -->
  <text class="mono ink3" x="40" y="34" font-size="12" letter-spacing="2">NACOS 2.x · CLUSTER ARCHITECTURE</text>

  <!-- ============ CLIENTS ROW ============ -->
  <g>
    <rect class="box" x="60"  y="52" width="200" height="56" rx="10"/>
    <rect class="box" x="300" y="52" width="200" height="56" rx="10"/>
    <rect class="box" x="540" y="52" width="200" height="56" rx="10"/>
    <text class="lbl ink"  x="160" y="78"  font-size="16" font-weight="600" text-anchor="middle">业务服务 SDK</text>
    <text class="mono ink3" x="160" y="96" font-size="11" text-anchor="middle">spring-cloud-alibaba</text>
    <text class="lbl ink"  x="400" y="78"  font-size="16" font-weight="600" text-anchor="middle">Nacos 控制台</text>
    <text class="mono ink3" x="400" y="96" font-size="11" text-anchor="middle">console · web ui</text>
    <text class="lbl ink"  x="640" y="78"  font-size="16" font-weight="600" text-anchor="middle">OpenAPI 调用</text>
    <text class="mono ink3" x="640" y="96" font-size="11" text-anchor="middle">v1/v2 · openapi</text>
  </g>

  <!-- arrow clients -> cluster -->
  <path class="flow" d="M400 108 V158" marker-end="url(#ah)"/>
  <rect x="430" y="118" width="270" height="32" rx="8" fill="#ffffff" stroke="#e0dccf" stroke-width="1"/>
  <text class="mono ink2" x="565" y="138" font-size="12.5" text-anchor="middle">gRPC 9848 长连接 · HTTP 8848</text>

  <!-- ============ CLUSTER BOX ============ -->
  <rect x="40" y="166" width="720" height="290" rx="14" fill="#fcfbf7" stroke="#d4cdba" stroke-width="1.5"/>
  <text class="mono" x="60" y="192" font-size="12.5" font-weight="700" fill="#3a5e8c" letter-spacing="1">NACOS 集群 · 3 节点（奇数 · Raft 多数派）</text>

  <!-- raft replication line under servers -->
  <path d="M150 330 H650" stroke="#3a5e8c" stroke-width="1.6" stroke-dasharray="6 5" fill="none" marker-end="url(#ahr)" marker-start="url(#ahl)"/>
  <rect x="320" y="316" width="160" height="28" rx="7" fill="#eef2f7" stroke="#c3d0e0" stroke-width="1"/>
  <text class="mono" x="400" y="335" font-size="11.5" fill="#3a5e8c" text-anchor="middle" font-weight="600">Raft 日志复制 / 选主</text>

  <!-- server nodes -->
  <!-- nacos-1 LEADER (accent) -->
  <rect x="70"  y="210" width="200" height="96" rx="11" fill="#fbeee9" stroke="#c75132" stroke-width="2"/>
  <text class="mono ink" x="170" y="250" font-size="19" font-weight="700" text-anchor="middle">nacos-1</text>
  <rect x="128" y="262" width="84" height="24" rx="6" fill="#c75132"/>
  <text class="mono" x="170" y="279" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">LEADER</text>
  <!-- nacos-2 FOLLOWER -->
  <rect x="300" y="210" width="200" height="96" rx="11" fill="#eef2f7" stroke="#3a5e8c" stroke-width="1.6"/>
  <text class="mono ink" x="400" y="250" font-size="19" font-weight="700" text-anchor="middle">nacos-2</text>
  <rect x="350" y="262" width="100" height="24" rx="6" fill="#ffffff" stroke="#3a5e8c" stroke-width="1.4"/>
  <text class="mono" x="400" y="279" font-size="12" font-weight="700" fill="#3a5e8c" text-anchor="middle" letter-spacing="1">FOLLOWER</text>
  <!-- nacos-3 FOLLOWER -->
  <rect x="530" y="210" width="200" height="96" rx="11" fill="#eef2f7" stroke="#3a5e8c" stroke-width="1.6"/>
  <text class="mono ink" x="630" y="250" font-size="19" font-weight="700" text-anchor="middle">nacos-3</text>
  <rect x="580" y="262" width="100" height="24" rx="6" fill="#ffffff" stroke="#3a5e8c" stroke-width="1.4"/>
  <text class="mono" x="630" y="279" font-size="12" font-weight="700" fill="#3a5e8c" text-anchor="middle" letter-spacing="1">FOLLOWER</text>

  <!-- protocol tags -->
  <g>
    <rect x="92"  y="360" width="270" height="64" rx="10" fill="#e3efe9" stroke="#2f6f5e" stroke-width="1.4"/>
    <circle cx="116" cy="384" r="5" fill="#2f6f5e"/>
    <text class="mono" x="130" y="389" font-size="13.5" font-weight="700" fill="#2f6f5e">Distro 协议 · AP</text>
    <text class="lbl ink2" x="116" y="410" font-size="12.5">临时实例 ephemeral · 最终一致 · 高可用</text>

    <rect x="438" y="360" width="270" height="64" rx="10" fill="#e7edf5" stroke="#3a5e8c" stroke-width="1.4"/>
    <circle cx="462" cy="384" r="5" fill="#3a5e8c"/>
    <text class="mono" x="476" y="389" font-size="13.5" font-weight="700" fill="#3a5e8c">Raft 协议 · CP</text>
    <text class="lbl ink2" x="462" y="410" font-size="12.5">持久实例 / 配置 / 元数据 · 强一致</text>
  </g>

  <!-- arrow cluster -> mysql -->
  <path class="flow" d="M400 456 V506" marker-end="url(#ah)"/>
  <rect x="300" y="466" width="200" height="30" rx="8" fill="#fcfbf7" stroke="#e0dccf" stroke-width="1"/>
  <text class="mono ink2" x="400" y="485" font-size="12" text-anchor="middle">持久化 · 共享外置存储</text>

  <!-- ============ MYSQL ============ -->
  <rect x="220" y="514" width="360" height="64" rx="11" fill="#f6eed8" stroke="#b3892a" stroke-width="1.8"/>
  <g transform="translate(252,534)">
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="none" stroke="#b3892a" stroke-width="1.6"/>
    <path d="M-12 0 V13 a12 5 0 0 0 24 0 V0" fill="none" stroke="#b3892a" stroke-width="1.6"/>
    <path d="M-12 6.5 a12 5 0 0 0 24 0" fill="none" stroke="#b3892a" stroke-width="1.4"/>
  </g>
  <text class="lbl ink" x="288" y="542" font-size="16" font-weight="700">MySQL 8 · 外置存储</text>
  <text class="mono ink3" x="288" y="562" font-size="11.5">集群三节点共享 · nacos-mysql.sql 初始化</text>
</svg>
